name: Deploy to IONOS Webspace

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "AGENTS.md"
      - "case-logs/**"
      - "logs/**"
      - ".github/**"

concurrency:
  group: ionos-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Upload site to IONOS via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USERNAME }}
          password: ${{ secrets.IONOS_PASSWORD }}
          port: 22
          local_path: "./*"
          remote_path: ${{ secrets.IONOS_REMOTE_PATH }}
          rsyncArgs: >-
            --exclude=.git
            --exclude=.github
            --exclude=.gitignore
            --exclude=AGENTS.md
            --exclude=README.md
            --exclude=case-logs
            --exclude=logs
            --exclude=.DS_Store
          sftpArgs: "-o StrictHostKeyChecking=no"
